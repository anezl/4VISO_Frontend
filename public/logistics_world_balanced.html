<!DOCTYPE html>
<html><head><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f0f2f4;overflow:hidden;width:100vw;height:100vh}
canvas{display:block;width:100%;height:100%;object-fit:cover}
</style></head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 680;
canvas.height = 420;
const W = canvas.width, H = canvas.height;

const GREEN = '#4caf7d';
const GREEN2 = '#78c89a';
const BG = '#f0f2f4';
const GRID = '#e0e3e6';

const nodes = [
  {x:80,  y:55,  r:7,  hub:true},
  {x:210, y:90,  r:5,  hub:false},
  {x:340, y:60,  r:8,  hub:true},
  {x:480, y:95,  r:5,  hub:false},
  {x:590, y:70,  r:6,  hub:true},
  {x:60,  y:200, r:5,  hub:false},
  {x:180, y:180, r:6,  hub:true},
  {x:320, y:210, r:9,  hub:true},
  {x:460, y:175, r:7,  hub:true},
  {x:600, y:200, r:5,  hub:false},
  {x:110, y:310, r:5,  hub:false},
  {x:250, y:330, r:6,  hub:true},
  {x:390, y:350, r:5,  hub:false},
  {x:530, y:320, r:7,  hub:true},
  {x:640, y:360, r:5,  hub:false},
  {x:170, y:390, r:4,  hub:false},
  {x:430, y:400, r:4,  hub:false},
  {x:650, y:140, r:4,  hub:false},
  {x:40,  y:350, r:4,  hub:false},
  {x:300, y:400, r:4,  hub:false},
];

const allRoutes = [
  {from:0,to:2,type:'air'},
  {from:2,to:4,type:'air'},
  {from:2,to:7,type:'air'},
  {from:4,to:8,type:'air'},
  {from:0,to:6,type:'truck'},
  {from:6,to:7,type:'truck'},
  {from:7,to:8,type:'truck'},
  {from:8,to:9,type:'truck'},
  {from:1,to:6,type:'truck'},
  {from:3,to:8,type:'truck'},
  {from:5,to:11,type:'truck'},
  {from:7,to:11,type:'ship'},
  {from:11,to:13,type:'ship'},
  {from:13,to:14,type:'ship'},
  {from:10,to:11,type:'ship'},
  {from:6,to:11,type:'ship'},
  {from:4,to:17,type:'air'},
  {from:9,to:17,type:'truck'},
  {from:18,to:10,type:'truck'},
  {from:15,to:19,type:'ship'},
  {from:19,to:12,type:'ship'},
  {from:11,to:16,type:'truck'},
  {from:12,to:13,type:'truck'},
  {from:0,to:5,type:'truck'},
  {from:5,to:10,type:'ship'},
  {from:13,to:9,type:'air'},
  {from:7,to:3,type:'air'},
];

const vehicles = [
  {route:allRoutes[0], t:0.1,  speed:0.0026, type:'air'},
  {route:allRoutes[1], t:0.5,  speed:0.0024, type:'air'},
  {route:allRoutes[2], t:0.75, speed:0.0028, type:'air'},
  {route:allRoutes[25],t:0.3,  speed:0.0022, type:'air'},
  {route:allRoutes[4], t:0.2,  speed:0.0017, type:'truck'},
  {route:allRoutes[5], t:0.6,  speed:0.0019, type:'truck'},
  {route:allRoutes[8], t:0.4,  speed:0.0016, type:'truck'},
  {route:allRoutes[22],t:0.8,  speed:0.0018, type:'truck'},
  {route:allRoutes[11],t:0.15, speed:0.0013, type:'ship'},
  {route:allRoutes[12],t:0.55, speed:0.0012, type:'ship'},
  {route:allRoutes[24],t:0.35, speed:0.0011, type:'ship'},
].map(v=>({...v, trail:[]}));

function cpFor(a,b,type){
  const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
  const dx=b.x-a.x, dy=b.y-a.y;
  const len=Math.sqrt(dx*dx+dy*dy);
  let bend = type==='air' ? -0.38 : type==='ship' ? 0.28 : 0.12;
  return {
    cx: mx - dy/len * len * bend,
    cy: my + dx/len * len * bend
  };
}

function ptOnCurve(ax,ay,cx,cy,bx,by,t){
  const x=(1-t)*(1-t)*ax+2*(1-t)*t*cx+t*t*bx;
  const y=(1-t)*(1-t)*ay+2*(1-t)*t*cy+t*t*by;
  const tx=2*(1-t)*(cx-ax)+2*t*(bx-cx);
  const ty=2*(1-t)*(cy-ay)+2*t*(by-cy);
  return {x,y,angle:Math.atan2(ty,tx)};
}

let pulseT = 0;

function drawGrid(){
  ctx.strokeStyle=GRID;
  ctx.lineWidth=0.5;
  for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function drawRoutes(){
  allRoutes.forEach(r=>{
    const a=nodes[r.from], b=nodes[r.to];
    const {cx,cy}=cpFor(a,b,r.type);
    ctx.beginPath();
    ctx.moveTo(a.x,a.y);
    ctx.quadraticCurveTo(cx,cy,b.x,b.y);
    if(r.type==='air'){
      ctx.setLineDash([5,5]);
      ctx.strokeStyle='rgba(76,175,125,0.28)';
      ctx.lineWidth=1.1;
    } else if(r.type==='ship'){
      ctx.setLineDash([3,6]);
      ctx.strokeStyle='rgba(120,200,154,0.32)';
      ctx.lineWidth=1.3;
    } else {
      ctx.setLineDash([]);
      ctx.strokeStyle='rgba(76,175,125,0.32)';
      ctx.lineWidth=1.2;
    }
    ctx.stroke();
    ctx.setLineDash([]);
  });
}

function drawNodes(){
  nodes.forEach(n=>{
    if(n.hub){
      const pulse=0.5+0.5*Math.sin(pulseT*2+n.x*0.05);
      ctx.beginPath();ctx.arc(n.x,n.y,n.r+5+pulse*4,0,Math.PI*2);
      ctx.fillStyle=`rgba(76,175,125,${0.05+pulse*0.06})`;ctx.fill();
      ctx.beginPath();ctx.arc(n.x,n.y,n.r+2,0,Math.PI*2);
      ctx.fillStyle=`rgba(76,175,125,${0.1+pulse*0.08})`;ctx.fill();
    }
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.strokeStyle=GREEN;ctx.lineWidth=1.5;
    ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.arc(n.x,n.y,n.r*0.45,0,Math.PI*2);
    ctx.fillStyle=n.hub?GREEN:GREEN2;ctx.fill();
  });
}

function drawPlane(x,y,angle){
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);
  ctx.fillStyle=GREEN;
  ctx.beginPath();ctx.moveTo(12,0);ctx.lineTo(-8,5);ctx.lineTo(-5,0);ctx.lineTo(-8,-5);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(2,0);ctx.lineTo(-4,-9);ctx.lineTo(-7,-8);ctx.lineTo(-4,0);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(2,0);ctx.lineTo(-4,9);ctx.lineTo(-7,8);ctx.lineTo(-4,0);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(-5,0);ctx.lineTo(-8,-5);ctx.lineTo(-10,-4);ctx.lineTo(-8,0);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(-5,0);ctx.lineTo(-8,5);ctx.lineTo(-10,4);ctx.lineTo(-8,0);ctx.closePath();ctx.fill();
  ctx.restore();
}

function drawTruck(x,y,angle){
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);
  ctx.fillStyle=GREEN;
  ctx.beginPath();ctx.roundRect(-14,-5,22,9,2);ctx.fill();
  ctx.fillStyle=GREEN2;
  ctx.beginPath();ctx.roundRect(6,-5,8,9,1);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.beginPath();ctx.roundRect(7,-4,6,5,1);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(-8,5,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(4,5,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=GREEN;
  ctx.beginPath();ctx.arc(-8,5,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(4,5,1.5,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawShip(x,y,angle){
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);
  ctx.fillStyle=GREEN;
  ctx.beginPath();ctx.moveTo(14,2);ctx.quadraticCurveTo(0,-8,-14,2);ctx.lineTo(-12,8);ctx.lineTo(12,8);ctx.closePath();ctx.fill();
  ctx.fillStyle=GREEN2;
  ctx.beginPath();ctx.roundRect(-8,-2,10,6,1);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.45)';
  ctx.beginPath();ctx.roundRect(-6,-1,3,4,0.5);ctx.fill();
  ctx.beginPath();ctx.roundRect(-1,-1,3,4,0.5);ctx.fill();
  ctx.restore();
}

function drawTrail(trail,color){
  if(trail.length<2)return;
  for(let i=1;i<trail.length;i++){
    const alpha=(i/trail.length)*0.3;
    ctx.beginPath();
    ctx.moveTo(trail[i-1].x,trail[i-1].y);
    ctx.lineTo(trail[i].x,trail[i].y);
    ctx.strokeStyle=`rgba(76,175,125,${alpha})`;
    ctx.lineWidth=1.4;
    ctx.stroke();
  }
}

function frame(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);
  drawGrid();
  drawRoutes();
  drawNodes();
  pulseT+=0.02;

  vehicles.forEach(v=>{
    v.t+=v.speed;
    if(v.t>1)v.t=0;
    const r=v.route;
    const a=nodes[r.from],b=nodes[r.to];
    const {cx,cy}=cpFor(a,b,r.type);
    const pt=ptOnCurve(a.x,a.y,cx,cy,b.x,b.y,v.t);
    v.trail.push({x:pt.x,y:pt.y});
    if(v.trail.length>16)v.trail.shift();
    drawTrail(v.trail);
    if(v.type==='air') drawPlane(pt.x,pt.y,pt.angle);
    else if(v.type==='truck') drawTruck(pt.x,pt.y,pt.angle);
    else drawShip(pt.x,pt.y,pt.angle);
  });

  requestAnimationFrame(frame);
}
frame();
</script>
</body></html>
